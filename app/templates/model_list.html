{% extends "base.html" %}
{% block title %}{{ title }}{% end %}
{% block body %}
<div class="layui-layout layui-layout-admin">
    <div class="layui-header">
        <div class="layui-logo">cnAgentOS</div>
        <ul class="layui-nav layui-layout-right">
            <li class="layui-nav-item">
                <a href="javascript:;">{{ current_user }}</a>
                <dl class="layui-nav-child">
                    <dd><a href="javascript:;" onclick="document.getElementById('logout-form').submit()">退出登录</a></dd>
                </dl>
            </li>
        </ul>
    </div>
    <div class="layui-side layui-bg-black">
        <ul class="layui-nav layui-nav-tree">
            <li class="layui-nav-item"><a href="/"><i class="layui-icon layui-icon-home"></i> 首页</a></li>
            <li class="layui-nav-item"><a href="/users"><i class="layui-icon layui-icon-user"></i> 用户管理</a></li>
            <li class="layui-nav-item"><a href="/devices"><i class="layui-icon layui-icon-set"></i> 设备管理</a></li>
            <li class="layui-nav-item layui-this"><a href="/models"><i class="layui-icon layui-icon-engine"></i> 模型引擎</a></li>
            <li class="layui-nav-item"><a href="/apis"><i class="layui-icon layui-icon-link"></i> 接口管理</a></li>
            <li class="layui-nav-item"><a href="/servers"><i class="layui-icon layui-icon-util"></i> 服务器管理</a></li>
            <li class="layui-nav-item"><a href="/reports"><i class="layui-icon layui-icon-chart"></i> 数据报表</a></li>
            <li class="layui-nav-item"><a href="/twin"><i class="layui-icon layui-icon-component"></i> 📐 数字孪生</a></li>
        </ul>
    </div>
    <div class="layui-body" style="padding: 20px;">
        <div class="layui-card">
            <div class="layui-card-header">
                <div class="layui-row">
                    <div class="layui-col-md6" style="line-height:36px;">模型列表</div>
                    <div class="layui-col-md6" style="text-align:right;">
                        <button class="layui-btn layui-btn-sm" onclick="openForm()"><i class="layui-icon layui-icon-add-1"></i> 新增模型</button>
                    </div>
                </div>
            </div>
            <div class="layui-card-body">
                <div class="layui-row" style="margin-bottom:10px;">
                    <div class="layui-col-md4"><input id="search-kw" class="layui-input" placeholder="搜索名称/模型名"></div>
                    <div class="layui-col-md2" style="padding-left:10px;"><button class="layui-btn" onclick="doSearch()">搜索</button></div>
                </div>
                <div id="model-pager"></div>
                <div id="model-cards" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>
</div>
<form id="logout-form" method="post" action="/auth/logout" style="display:none">{% module xsrf_form_html() %}</form>

<div id="form-layer" style="display:none; padding:20px;">
    <form class="layui-form" lay-filter="mForm">
        <input type="hidden" name="id">
        <div class="layui-form-item"><label class="layui-form-label">名称</label><div class="layui-input-block"><input name="name" class="layui-input" lay-verify="required"></div></div>
        <div class="layui-form-item"><label class="layui-form-label">API Key</label><div class="layui-input-block"><input name="api_key" class="layui-input" placeholder="留空不修改"></div></div>
        <div class="layui-form-item"><label class="layui-form-label">API URL</label><div class="layui-input-block"><input name="api_url" class="layui-input"></div></div>
        <div class="layui-form-item"><label class="layui-form-label">模型名</label><div class="layui-input-block"><input name="model_name" class="layui-input"></div></div>
        <div class="layui-form-item"><label class="layui-form-label">温度</label><div class="layui-input-block"><input name="temperature" class="layui-input" value="0.7"></div></div>
        <div class="layui-form-item"><label class="layui-form-label">最大Token</label><div class="layui-input-block"><input name="max_tokens" class="layui-input" value="2048"></div></div>
    </form>
</div>

<audio id="tts-player" style="display:none"></audio>
<!-- 对话弹窗 -->
<div id="chat-layer" style="display:none;">
    <div class="chat-wrap">
        <div class="chat-topbar">
            <span>控制设备：</span>
            <select id="chat-device-sel" class="chat-dev-sel"><option value="">未选择</option></select>
            <span style="margin-left:12px;">TTS：</span>
            <button id="tts-toggle" class="tts-btn tts-on" onclick="toggleTTS()" title="开关语音播报">开</button>
            <select id="tts-voice" class="chat-dev-sel" onchange="changeVoice()" title="选择音色">
                <option value="jiaxin">嘉欣</option>
                <option value="xiaochun">小春</option>
            </select>
        </div>
        <div class="chat-body" id="chat-msgs"></div>
        <div class="chat-foot">
            <textarea id="chat-input" class="chat-txt" placeholder="输入消息，Enter 发送..." rows="2"></textarea>
            <button class="chat-btn" id="chat-send-btn" onclick="doChat()">发送</button>
        </div>
    </div>
</div>
{% end %}

{% block script %}
<script>
layui.use(['laypage','form','layer'],function(){
    var laypage=layui.laypage,form=layui.form,layer=layui.layer,$=layui.$,p=1;
    var chatModelId=0,chatSending=false,chatHistory=[];
    var ttsOn=true,ttsVoice='jiaxin';

    // 首次用户交互激活音频（绕过自动播放限制）
    $(document).one('click keydown',function(){
        document.getElementById('tts-player').play().catch(function(){});
    });

    window.toggleTTS=function(){
        ttsOn=!ttsOn;
        $('#tts-toggle').text(ttsOn?'开':'关').toggleClass('tts-on',ttsOn).toggleClass('tts-off',!ttsOn);
    };
    window.changeVoice=function(){
        ttsVoice=$('#tts-voice').val();
    };
    function playTTS(text){
        if(!ttsOn)return;
        var player=document.getElementById('tts-player');
        player.src='/api/tts?id=2&text='+encodeURIComponent(text)+'&voice='+ttsVoice;
        player.play().catch(function(){});
    }

    function load(pg){
        p=pg||1;
        $.get('/api/models',{page:p,limit:6,keyword:$('#search-kw').val()},function(r){
            var h='<div class="layui-row layui-col-space15">';
            if(!r.data||r.data.length==0)h='<div style="text-align:center;padding:60px;color:#999;">暂无模型</div>';
            for(var i=0;i<r.data.length;i++){
                var d=r.data[i],def=d.is_default==1,defBdg=def?'<span class="def-badge">默认</span>':'';
                h+='<div class="layui-col-md6"><div class="iot-card">'
                    +'<div class="card-left-bar" style="background:'+(def?'#5fb878':'#e0e0e0')+'"></div>'
                    +'<div class="card-body">'
                    +'<div class="card-header"><div class="card-title-row">'+defBdg+'<span class="card-name">'+d.name+'</span></div></div>'
                    +'<div class="model-meta"><span>'+d.model_name+'</span><span>T='+d.temperature+'</span><span>Max='+d.max_tokens+'</span></div>'
                    +'<div class="model-url">'+d.api_url+'</div>'
                    +'<div class="card-actions">'
                    +'<button class="layui-btn layui-btn-xs" onclick="openForm('+d.id+')">编辑</button>'
                    +'<button class="layui-btn layui-btn-xs layui-btn-normal" onclick="setDefault('+d.id+')">设为默认</button>'
                    +'<button class="layui-btn layui-btn-xs layui-btn-warm" onclick="openChat('+d.id+')">对话</button>'
                    +'<button class="layui-btn layui-btn-xs layui-btn-danger" onclick="delModel('+d.id+')">删除</button>'
                    +'</div></div></div></div>';
                if(i%2==1)h+='</div><div class="layui-row layui-col-space15">';
            }
            h+='</div>';$('#model-cards').html(h);
            laypage.render({elem:'model-pager',count:r.count,limit:6,curr:p,layout:['count','prev','page','next','skip'],jump:function(o,f){if(!f)load(o.curr);}});
        });
    }
    window.doSearch=function(){load(1);};
    window.openForm=function(id){
        form.val('mForm',{id:'',name:'',api_key:'',api_url:'',model_name:'',temperature:'0.7',max_tokens:'2048'});
        if(id){$.get('/api/models?page=1&limit=100',function(r){for(var i=0;i<r.data.length;i++)if(r.data[i].id==id){var d=r.data[i];form.val('mForm',{id:d.id,name:d.name,api_key:'',api_url:d.api_url,model_name:d.model_name,temperature:String(d.temperature),max_tokens:String(d.max_tokens)});break;}form.render(null,'mForm');});}
        layer.open({type:1,title:id?'编辑模型':'新增模型',area:['550px','480px'],content:$('#form-layer'),btn:['保存','取消'],yes:function(i){
            var d=form.val('mForm');d._xsrf=$('input[name="_xsrf"]').val();
            $.ajax({url:'/api/models',type:d.id?'PUT':'POST',data:d,dataType:'json',success:function(r){
                if(r.code==0){layer.msg(r.msg,{icon:1});load(p);layer.close(i);}else layer.msg(r.msg,{icon:2});
            }});
        }});
    };
    window.setDefault=function(id){
        layer.confirm('设为默认模型？',function(i){
            $.post('/api/models/default',{id:id,_xsrf:$('input[name="_xsrf"]').val()},function(r){
                r=JSON.parse(r);layer.msg(r.msg);load(p);layer.close(i);
            });
        });
    };
    window.delModel=function(id){
        layer.confirm('确定删除？',{icon:3},function(i){
            $.ajax({url:'/api/models',type:'DELETE',data:{id:id,_xsrf:$('input[name="_xsrf"]').val()},success:function(r){
                r=JSON.parse(r);layer.msg(r.msg);load(p);
            }});layer.close(i);
        });
    };
    window.openChat=function(id){
        chatModelId=id;chatSending=false;chatHistory=[];
        $('#chat-msgs').html('');$('#chat-input').val('');
        // 加载在线设备列表
        $('#chat-device-sel').html('<option value="">未选择</option>');
        $.get('/api/devices/online',function(r){r=JSON.parse(r);for(var i=0;i<r.data.length;i++){$('#chat-device-sel').append('<option value="'+r.data[i].box_id+'">'+r.data[i].box_id+'</option>');}});
        layer.open({type:1,title:'AI 对话 — 小智',area:['700px','550px'],content:$('#chat-layer')});
    };
    function addChatMsg(role,text){
        var t=new Date().toTimeString().slice(0,5);
        if(role==='sys'){
            $('#chat-msgs').append('<div class="c-row c-sys"><div class="c-bub"><div class="c-text">'+text+'</div></div></div>');
        }else{
            var cls=role==='user'?'c-usr':'c-ai';
            var avatar=role==='user'?'我':'小智';
            $('#chat-msgs').append('<div class="c-row '+cls+'"><div class="c-avatar">'+avatar+'</div><div class="c-bub"><div class="c-text">'+text+'</div><div class="c-time">'+t+'</div></div></div>');
        }
        var b=$('#chat-msgs')[0];b.scrollTop=b.scrollHeight;
    }
    function sendOneCmd(box,sid,cmd,cb){$.post('/api/servers/command',{server_id:sid,box_id:box,cmd:cmd,_xsrf:$('input[name="_xsrf"]').val()},function(r){if(cb)cb(r,cmd);},'json');}
    function sendDeviceCmds(cmds){
        var box=$('#chat-device-sel').val();
        if(!box){addChatMsg('sys','<span style="color:#F85149">请选择设备</span>');return;}
        $.get('/api/servers?page=1&limit=100',function(sr){
            var sid=0;
            for(var i=0;i<sr.data.length;i++){if(sr.data[i].running){sid=sr.data[i].id;break;}}
            if(!sid){addChatMsg('sys','<span style="color:#F85149">没有运行中的服务器</span>');return;}
            // on/off 先切手动
            var hasOnOff=cmds.some(function(c){return c.cmd==='on'||c.cmd==='off';});
            if(hasOnOff)sendOneCmd(box,sid,'manual',function(){setTimeout(function(){execCmdSeq(box,sid,cmds,0);},200);});
            else execCmdSeq(box,sid,cmds,0);
        },'json');
    }
    function detectCommands(txt){
        // 返回指令序列 [{cmd, delay}]
        var t=txt.toLowerCase(),cmds=[];
        var kw={on:/开灯|打开灯|开LED|亮灯/,off:/关灯|关闭灯|关LED|灭灯/,auto:/自动模式|切换自动/,manual:/手动模式|切换手动/,status:/查询状态|查看状态/,screen_on:/亮屏|开屏幕/,screen_off:/息屏|关屏幕|灭屏/};
        // 提取时间：3s、3秒、3秒钟
        var delayMatch=t.match(/(\d+)\s*[s秒]/);
        var delay=delayMatch?parseInt(delayMatch[1]):0;
        for(var k in kw){
            if(kw[k].test(t))cmds.push({cmd:k,delay:delay});
        }
        return cmds;
    }
    function execCmdSeq(box,sid,cmds,idx){
        if(idx>=cmds.length)return;
        var c=cmds[idx];
        sendOneCmd(box,sid,c.cmd,function(r){
            addChatMsg('sys','<span style="color:'+(r.code===0?'#00BFA5':'#F85149')+'">指令 '+c.cmd+' → '+box+'</span>');
            // status 指令后读取设备状态
            if(c.cmd==='status'){setTimeout(function(){$.get('/api/devices/online',function(d){for(var i=0;i<d.data.length;i++){if(d.data[i].box_id===box){var s=d.data[i];addChatMsg('sys','<span style="color:#79C0FF">LED:'+(s.led?'ON':'OFF')+' 光敏:'+(s.light?'Dark':'Bright')+' 人体:'+(s.pir?'Body':'None')+' 模式:'+s.mode+'</span>');}}});},500);}
            var next=c.delay>0?c.delay*1000:200;
            setTimeout(function(){execCmdSeq(box,sid,cmds,idx+1);},next);
        });
    }
    window.doChat=function(){
        if(chatSending)return;
        var txt=$('#chat-input').val().trim();
        if(!txt)return;
        addChatMsg('user',txt.replace(/\n/g,'<br>'));
        // 关键词检测，自动下发指令序列
        var cmds=detectCommands(txt);
        if(cmds.length>0)sendDeviceCmds(cmds);
        $('#chat-input').val('');chatSending=true;
        $('#chat-send-btn').text('...').prop('disabled',true);
        addChatMsg('ai','<span class="c-typing"></span>');
        var bubble=$('.c-ai:last .c-text');
        $.post('/api/models/chat/stream',{
            id:chatModelId,prompt:txt,history:JSON.stringify(chatHistory),_xsrf:$('input[name="_xsrf"]').val()
        },function(r){
            r=JSON.parse(r);
            if(r.code===0){
                chatHistory.push({role:'user',content:txt});
                chatHistory.push({role:'assistant',content:r.reply});
                bubble.html(r.reply.replace(/\n/g,'<br>'));
                playTTS(r.reply);
            }else{
                bubble.html('<span style="color:#F85149">'+r.msg+'</span>');
            }
            chatSending=false;$('#chat-send-btn').text('发送').prop('disabled',false);
            var b=$('#chat-msgs')[0];b.scrollTop=b.scrollHeight;
        });
        var b=$('#chat-msgs')[0];b.scrollTop=b.scrollHeight;
    };
    $('#chat-input').on('keydown',function(e){if(e.keyCode==13&&!e.shiftKey){e.preventDefault();doChat();}});
    $('#search-kw').on('keydown',function(e){if(e.keyCode==13)doSearch();});
    load(1);
});
</script>
<style>
.model-meta {display:flex;gap:16px;padding:4px 24px;font-size:13px;color:#555;}
.model-url {padding:0 24px 8px;font-size:12px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.def-badge {display:inline-block;padding:1px 8px;background:#E8F5E9;color:#2E7D32;border-radius:4px;font-size:11px;font-weight:600;}
.chat-wrap {display:flex;flex-direction:column;height:450px;background:#f5f7fa;}
.chat-topbar {display:flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border-bottom:1px solid #eee;font-size:13px;color:#666;}
.chat-dev-sel {height:30px;border:1px solid #ddd;border-radius:4px;padding:0 8px;font-size:12px;outline:none;}
.tts-btn {height:30px;padding:0 12px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #ddd;transition:all 0.2s;}
.tts-on {background:#00BFA5;color:#fff;border-color:#00BFA5;}
.tts-off {background:#fff;color:#999;}
.chat-body {flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.c-row {display:flex;gap:8px;max-width:85%;}
.c-usr {align-self:flex-end;flex-direction:row-reverse;}
.c-ai {align-self:flex-start;}
.c-avatar {width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}
.c-usr .c-avatar {background:linear-gradient(135deg,#1E9FFF,#00BFA5);}
.c-ai .c-avatar {background:linear-gradient(135deg,#FF9800,#F44336);}
.c-bub {display:flex;flex-direction:column;}
.c-text {background:#fff;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.7;box-shadow:0 1px 4px rgba(0,0,0,0.06);word-break:break-word;}
.c-usr .c-text {background:#1E9FFF;color:#fff;}
.c-time {font-size:10px;color:#bbb;margin-top:3px;text-align:right;}
.c-usr .c-time {text-align:left;}
.chat-foot {display:flex;gap:8px;align-items:flex-end;padding:12px;background:#fff;border-top:1px solid #eee;}
.chat-txt {flex:1;border:1px solid #e6e6e6;border-radius:8px;padding:8px 12px;font-size:14px;resize:none;outline:none;font-family:inherit;line-height:1.5;}
.chat-txt:focus {border-color:#1E9FFF;}
.chat-btn {height:40px;padding:0 20px;background:#1E9FFF;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;}
.chat-btn:hover {background:#1976D2;}
.c-sys {max-width:100%!important;align-self:center;font-size:12px;}
.c-sys .c-avatar {display:none;}
.c-sys .c-bub {text-align:center;}
.c-sys .c-text {background:transparent;box-shadow:none;padding:4px 8px;font-size:12px;}
.c-sys .c-time {display:none;}
.c-typing {display:inline-block;width:6px;height:6px;background:#999;border-radius:50%;animation:cblink 0.8s infinite;}
@keyframes cblink {0%,100%{opacity:0.2}50%{opacity:1}}
</style>
{% end %}
